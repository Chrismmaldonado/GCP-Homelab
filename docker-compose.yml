services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SERVERURL=35.208.114.226
      - SERVERPORT=443
      - PEERS=phone,iphonelab,computer,eric,keith
      - PEERDNS=127.0.0.1
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=0.0.0.0/0
    volumes:
      - ./config:/config
    ports:
      - 443:51820/udp
      - 82:80
      - 81:81
      - 8088:8088
      - 8080:8080
      - 8334:8334
      - 127.0.0.1:10086:10086
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: always

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    environment:
      - TZ=Etc/UTC
      - WEBPASSWORD=admin
      - DNSMASQ_LISTENING=all
      - FTLCONF_dns_listeningMode=all
      - FTLCONF_webserver_port=8088
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    restart: always
    network_mode: service:wireguard

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: always
    environment:
      - SIGNUPS_ALLOWED=true
      - ADMIN_TOKEN=AdminPassword123
      - ROCKET_PORT=8080
      - ROCKET_TLS={certs="/ssl/cert.pem",key="/ssl/key.pem"}
    volumes:
      - ./vw-data:/data
      - ./vw-ssl:/ssl:ro
    network_mode: service:wireguard

  filestash:
    image: machines/filestash:latest
    container_name: filestash
    restart: always
    volumes:
      - ./my-files:/app/data/storage/local
      - ./filestash-data:/app/data/state
    network_mode: service:wireguard

  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: unless-stopped
    network_mode: service:wireguard
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt

  wireguard-ui:
    image: ghcr.io/wgdashboard/wgdashboard:latest
    container_name: wgdashboard
    network_mode: service:wireguard
    volumes:
      - ./config:/etc/wireguard
      - ./wg_data:/data
    environment:
      - TZ=America/New_York
      - PUBLIC_IP=35.208.114.226
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  wiki:
    image: requarks/wiki:2
    container_name: wiki
    restart: unless-stopped
    environment:
      DB_TYPE: sqlite
    volumes:
      - ./wiki-data:/sqlite
    ports:
      - "3001:3000"
