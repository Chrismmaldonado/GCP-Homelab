version: "3.8"
services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SERVERURL=YOUR_PUBLIC_IP
      - SERVERPORT=51820
      - PEERS=phone,computer
      - PEERDNS=127.0.0.1
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=0.0.0.0/0
    volumes:
      - ./config:/config
    ports:
      - 51820:51820/udp
      - 81:81
      - 80:80
      - 443:443
      - 8080:8080
      - 8088:8088
      - 8334:8334
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: always

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    environment:
      - TZ=Etc/UTC
      - WEBPASSWORD=YOUR_PIHOLE_PASSWORD
      - FTLCONF_dns_listeningMode=all
      - FTLCONF_webserver_port=8088
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    restart: always
    network_mode: service:wireguard

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: always
    environment:
      - SIGNUPS_ALLOWED=true
      - ADMIN_TOKEN=YOUR_ADMIN_TOKEN
      - ROCKET_PORT=8080
      - ROCKET_TLS={certs="/ssl/cert.pem",key="/ssl/key.pem"}
    volumes:
      - ./vw-data:/data
      - ./vw-ssl:/ssl:ro
    network_mode: service:wireguard

  filestash:
    image: machines/filestash:latest
    container_name: filestash
    restart: always
    volumes:
      - ./my-files:/app/data/storage/local
      - ./filestash-data:/app/data/state
    network_mode: service:wireguard

  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: npm
    restart: unless-stopped
    network_mode: service:wireguard
    depends_on:
      - wireguard
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt

  wiki:
    image: lscr.io/linuxserver/wikijs:latest
    container_name: wiki
    restart: unless-stopped
    user: "0:0"
    environment:
      - PUID=0
      - PGID=0
      - TZ=Etc/UTC
      - DB_TYPE=sqlite
      - SET_X_FRAME_OPTIONS=false
    ports:
      - 3001:3000
    volumes:
      - ./wiki-data:/config
      - ./wiki-data/data:/data
